# Example configuration for process-tracer daemon mode.
#
# Usage:
#   sudo ./process-tracer daemon -c ambient.example.yaml
#
# Or via environment variable:
#   export PROCESS_TRACER_DAEMON_CONFIG=ambient.example.yaml
#   sudo ./process-tracer daemon

rules:
  # Trace all make invocations
  - name: "builds"
    match:
      command: "make"
    attributes:
      service.name: "build"

  # Trace any container's init process (PID 1 in a non-root PID namespace)
  - name: "containers"
    match:
      is_container_init: true
    attributes:
      service.name: "container"

  # Trace deploy scripts
  - name: "deployments"
    match:
      command: "deploy-*"
    # skip_empty_values: when true, attributes that evaluate to "" are omitted
    # from spans. Useful when some env vars are only present conditionally
    # (e.g. CI merge-request variables, deploy environment names).
    skip_empty_values: true
    attributes:
      service.name: "deployment"
      deploy.env: 'expr:env["DEPLOY_ENV"]'
    trace_id: 'expr:env["DEPLOY_TRACE_ID"]'
    # add_debug_attributes: when true, emits debug.argv, debug.environ, and
    # debug.trace_id.*/debug.parent_id.* provenance attributes on spans. These
    # may contain sensitive data (full environment, full argv) - enable only
    # when investigating why trace_id/parent_id resolution is misbehaving.
    # add_debug_attributes: true

# Optional: override OTEL settings (otherwise uses standard OTEL_* env vars)
# otel:
#   endpoint: "localhost:4318"
#   service_name: "process-tracer-daemon"

limits:
  max_concurrent_sessions: 100
  max_pids_per_session: 1000
  max_total_pids: 8000
  session_timeout: 1h
  ring_buffer_size: 8388608  # 8MB
