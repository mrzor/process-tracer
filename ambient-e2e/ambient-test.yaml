rules:
  - name: "e2e-make"
    match:
      command: "make"
    # add_debug_attributes emits debug.argv + debug.environ on every span and
    # debug.trace_id.*/debug.parent_id.* provenance on the root span. Enabled
    # on this rule only — e2e-perl should NOT get these attrs (per-rule scoping).
    add_debug_attributes: true
    attributes:
      service.name: "ambient-e2e-make"
      build.id: 'expr:env["BUILD_ID"]'
      build.region: 'expr:env["BUILD_REGION"]'

  - name: "e2e-perl"
    match:
      command: "perl"
    attributes:
      service.name: "ambient-e2e-perl"
      job.id: 'expr:env["JOB_ID"]'
      job.tier: 'expr:env["JOB_TIER"]'

otel:
  endpoint: "http://10.0.2.2:4318"
  service_name: "ambient-e2e-daemon"

limits:
  max_concurrent_sessions: 10
  max_pids_per_session: 100
  max_total_pids: 500
  session_timeout: 5m
  ring_buffer_size: 4194304
