# Daemon mode configuration for GitLab CI.
#
# Port of the trace-mode shell wrapper that sets CI/CD span attributes.
#
# Why `context_starved: true` on a `runc` match, not `is_container_init`:
# GitLab Runner's docker executor injects the step script via `docker exec`,
# which at the kernel level is `runc exec`. The kernel's `task->real_parent`
# for these injected processes is the host-side `runc exec` — NOT the
# container's PID 1. An `is_container_init: true` rule therefore never sees
# the step script; it only sees the container's ENTRYPOINT subtree.
#
# `context_starved: true` tells the daemon: match on the injector (runc),
# but don't start an OTEL session until a descendant's envp carries the
# CI_* variables referenced below. GitLab Runner sets CI_* at bash runtime
# (inside the eval'd step script), so they first appear in an execve envp
# several levels below the injector — past a fork-only pipe subshell.
# The daemon walks descendants through fork-only intermediaries until any
# of the rule's Expr expressions resolves non-empty.
#
# skip_empty_values is enabled so that attributes whose env vars are absent
# (e.g. MR-only or deploy-only variables) are silently omitted from spans.

rules:
  - name: "gitlab-ci"
    match:
      command: "runc"
    context_starved: true
    skip_empty_values: true
    trace_id: 'expr:env["CI_PIPELINE_ID"]'
    # parent_id: groups all sessions within the same CI job under a common
    # parent span. CI_JOB_ID is not valid 16-char hex, so it's SHA-256 hashed
    # to produce a deterministic SpanID. All docker exec invocations
    # (before_script, script, after_script) sharing the same CI_JOB_ID will
    # point to the same virtual parent, letting APM tools group them.
    parent_id: 'expr:env["CI_JOB_ID"]'
    # add_debug_attributes: emits debug.argv, debug.environ on every span
    # plus debug.trace_id.*/debug.parent_id.* provenance on the process.tree
    # root. Useful when investigating why CI_PIPELINE_ID isn't producing the
    # expected trace_id (wrong env, hashed fallback path, missing var). May
    # contain sensitive data (full env, full argv) -- disable once the
    # trace_id pipeline is verified.
    add_debug_attributes: true
    attributes:
      # service.*
      service.name: 'expr:env["PROJECT_TYPE"] + "-" + env["PROJECT_NAME"] + "-ci"'

      # cicd.pipeline.*
      cicd.pipeline.run.id: 'expr:env["CI_PIPELINE_ID"]'
      cicd.pipeline.run.url.full: 'expr:env["CI_PIPELINE_URL"]'
      cicd.pipeline.name: 'expr:env["CI_PIPELINE_NAME"]'

      # cicd.pipeline.task.* (GitLab "job" -> OTel "task")
      cicd.pipeline.task.run.id: 'expr:env["CI_JOB_ID"]'
      cicd.pipeline.task.name: 'expr:env["CI_JOB_NAME"]'
      cicd.pipeline.task.run.url.full: 'expr:env["CI_JOB_URL"]'
      cicd.pipeline.task.type: 'expr:env["CI_JOB_STAGE"]'

      # cicd.worker.* (GitLab "runner" -> OTel "worker")
      cicd.worker.id: 'expr:env["CI_RUNNER_ID"]'
      cicd.worker.name: 'expr:env["CI_RUNNER_DESCRIPTION"]'

      # user.*
      user.id: 'expr:env["GITLAB_USER_ID"]'
      user.name: 'expr:env["GITLAB_USER_LOGIN"]'
      user.full_name: 'expr:env["GITLAB_USER_NAME"]'
      user.email: 'expr:env["GITLAB_USER_EMAIL"]'

      # vcs.repository.*
      vcs.provider.name: "gitlab"
      vcs.repository.name: 'expr:env["CI_PROJECT_NAME"]'
      vcs.repository.url.full: 'expr:env["CI_PROJECT_URL"] + ".git"'
      vcs.owner.name: 'expr:env["CI_PROJECT_NAMESPACE"]'

      # vcs.ref.head.*
      vcs.ref.head.name: 'expr:env["CI_COMMIT_REF_NAME"]'
      vcs.ref.head.revision: 'expr:env["CI_COMMIT_SHA"]'
      vcs.ref.head.type: 'expr:env["CI_COMMIT_BRANCH"] != "" ? "branch" : (env["CI_COMMIT_TAG"] != "" ? "tag" : "")'

      # vcs.change.* (merge request pipelines only — empty values auto-skipped)
      vcs.change.id: 'expr:env["CI_MERGE_REQUEST_IID"]'
      vcs.change.title: 'expr:env["CI_MERGE_REQUEST_TITLE"]'
      vcs.ref.base.name: 'expr:env["CI_MERGE_REQUEST_TARGET_BRANCH_NAME"]'
      vcs.change.source.branch: 'expr:env["CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"]'
      vcs.change.labels: 'expr:env["CI_MERGE_REQUEST_LABELS"]'

      # deployment.* (deploy jobs only — empty values auto-skipped)
      deployment.environment.name: 'expr:env["CI_ENVIRONMENT_NAME"]'

      # Semconv-inspired additions (not yet standardized)
      # Named to align with existing OTel conventions. Review periodically:
      # https://opentelemetry.io/docs/specs/semconv/registry/
      cicd.pipeline.run.trigger: 'expr:env["CI_PIPELINE_SOURCE"]'
      vcs.commit.message.title: 'expr:env["CI_COMMIT_TITLE"]'
      vcs.commit.author: 'expr:env["CI_COMMIT_AUTHOR"]'
      vcs.repository.path: 'expr:env["CI_PROJECT_PATH"]'

### REQUIRED IMPROVEMENTS
#
# - skip_empty_values is all-or-nothing per rule. There is no way to mark
#   individual attributes as "required" (always emit, even if empty) vs
#   "optional" (skip when empty). For this config this is fine since all
#   the always-present GitLab vars will never be empty in a CI context.
